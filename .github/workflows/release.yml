name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0)"
        required: true
        type: string
      dry-run:
        description: "Dry run without actually submitting"
        type: boolean
        default: true
      firefox-channel:
        description: "Firefox channel"
        type: choice
        options:
          - listed
          - unlisted
        default: listed

permissions:
  contents: write

jobs:
  bump-and-tag:
    name: Bump version and create tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        id: vars
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be in semver format (e.g., 0.1.0)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update package.json version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.vars.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "

      - name: Commit and push version bump
        run: |
          git add package.json
          git commit -m "chore(release): ${{ steps.vars.outputs.tag }}"
          git push origin HEAD

      - name: Create and push tag
        run: |
          git tag ${{ steps.vars.outputs.tag }}
          git push origin ${{ steps.vars.outputs.tag }}

  build:
    name: Build extension ZIPs
    needs: bump-and-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run compile

      - name: Clean env files before zipping
        run: rm -f .env .env.*

      - name: Build and zip Chrome extension
        run: pnpm zip

      - name: Build and zip Firefox extension
        run: pnpm zip:firefox
        env:
          # Optional: stable extension ID from AMO.
          # If omitted, AMO will auto-assign an ID on first submission.
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}

      - name: Upload extension ZIPs
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: .output/*.zip
          if-no-files-found: error

  submit-firefox:
    name: Submit to Firefox Add-ons
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download extension ZIPs
        uses: actions/download-artifact@v4
        with:
          name: extension-zips
          path: .output

      - name: Submit to Firefox Add-ons
        run: |
          DRY_RUN=""
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            DRY_RUN="--dry-run"
          fi

          pnpm wxt submit \
            --firefox-zip .output/*-firefox.zip \
            --firefox-sources-zip .output/*-sources.zip \
            --firefox-channel ${{ inputs.firefox-channel }} \
            $DRY_RUN
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

  github-release:
    name: Create GitHub Release
    needs: [bump-and-tag, build]
    if: inputs.dry-run != true
    runs-on: ubuntu-latest
    steps:
      - name: Download extension ZIPs
        uses: actions/download-artifact@v4
        with:
          name: extension-zips
          path: .output

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-and-tag.outputs.tag }}
          files: .output/*.zip
          generate_release_notes: true
